<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Imo i Nicro · hrvatski za nas dvoje</title>
  <meta name="theme-color" content="#1f6f8b">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icons/icon-192.png" type="image/png">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Imo i Nicro">
  <link rel="stylesheet" href="css/app.css">
  <!-- Everything is local: no fonts, no CDNs, no external images. Works from file:// and offline;
       hosted over https it installs as a PWA on Android and iPhone. -->
</head>
<body>
  <div id="app"></div>
  <script>
    // If startup dies before drawing anything, say so — never a silent blank screen.
    (function () {
      function show(msg) {
        var app = document.getElementById('app');
        if (!app || app.children.length) return; // app is drawing; it reports its own errors
        app.innerHTML =
          '<div style="max-width:34em;margin:18vh auto 0;padding:0 1.2em;font:16px/1.5 system-ui,sans-serif">' +
          '<h2 style="margin:0 0 .4em">Something broke while starting</h2>' +
          '<p style="color:#666;overflow-wrap:anywhere"></p>' +
          '<button style="font:inherit;padding:.5em 1.1em" onclick="location.reload()">Reload</button></div>';
        app.querySelector('p').textContent = msg || 'Unknown error';
      }
      window.addEventListener('error', function (e) { show(e.message); });
      window.addEventListener('unhandledrejection', function (e) {
        show((e.reason && e.reason.message) || String(e.reason));
      });
    })();
  </script>
  <script src="js/icons.js"></script>
  <script src="js/srs.js"></script>
  <script src="js/db.js"></script>
  <script src="js/clock.js"></script>
  <script src="js/stats.js"></script>
  <script src="js/vault.js"></script>
  <script src="js/sync.js"></script>
  <script src="js/audio.js"></script>
  <script src="js/content.js"></script>
  <script src="js/exercises.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
